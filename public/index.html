<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Pro Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255,255,255,0.1);
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }
        .form-section {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }
        .tasks-section {
            padding: 30px;
            min-height: 300px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h3 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #999;
        }
        .task-item {
            background: #f8f9fa;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            border-left: 5px solid #4facfe;
            transition: all 0.3s;
        }
        .task-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .task-title {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .task-desc {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #888;
        }
        .task-actions {
            display: flex;
            gap: 10px;
        }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        button:hover { transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 Pro Task Manager</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="totalTasks">0</span>
                    Tasks
                </div>
            </div>
        </div>

        <!-- Form -->
        <div class="form-section">
            <div class="form-group">
                <label>📝 Task Name</label>
                <input type="text" id="taskName" placeholder="Enter task name...">
            </div>
            <div class="form-group">
                <label>📄 Description</label>
                <textarea id="taskDesc" placeholder="Enter task description..."></textarea>
            </div>
            <div class="form-group">
                <label>📊 Priority</label>
                <select id="taskPriority">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="createTask()">➕ Create New Task</button>
                <button class="btn-warning" onclick="clearForm()">🔄 Clear</button>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="tasks-section">
            <div id="tasksContainer">
                <div class="empty-state">
                    <h3>No tasks yet!</h3>
                    <p>Create your first task using the form above 👆</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let nextId = 1;

        // Load tasks from API
        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                const data = await response.json();
                tasks = data.data || data || [];
                updateUI();
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        // Update UI
        function updateUI() {
            document.getElementById('totalTasks').textContent = tasks.length;
            
            const container = document.getElementById('tasksContainer');
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks yet!</h3>
                        <p>Create your first task using the form above 👆</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <div class="task-title">${task.title}</div>
                    ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
                    <div class="task-meta">
                        <span>ID: ${task.id} | ${new Date(task.createdAt).toLocaleDateString('en-CA')}</span>
                        <div class="task-actions">
                            <button class="btn-success" onclick="toggleTask(${task.id})">
                                ${task.completed ? '↩️ Mark Incomplete' : '✅ Mark Complete'}
                            </button>
                            <button class="btn-danger" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Create new task
        async function createTask() {
            const title = document.getElementById('taskName').value.trim();
            const description = document.getElementById('taskDesc').value.trim();
            const priority = document.getElementById('taskPriority').value;

            if (!title) {
                alert('Task name is required!');
                return;
            }

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        title, 
                        description: description || '',
                        priority 
                    })
                });

                if (response.ok) {
                    clearForm();
                    loadTasks();
                }
            } catch (error) {
                alert('Error creating task!');
            }
        }

        // Toggle task completion
        async function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            try {
                await fetch(`/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !task.completed })
                });
                loadTasks();
            } catch (error) {
                alert('Error updating task!');
            }
        }

        // Delete task
        async function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                try {
                    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                    loadTasks();
                } catch (error) {
                    alert('Error deleting task!');
                }
            }
        }

        // Clear form
        function clearForm() {
            document.getElementById('taskName').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskPriority').value = 'low';
        }

        // Initialize
        loadTasks();
        setInterval(loadTasks, 3000); // Auto refresh every 3 seconds
    </script>
</body>
</html>
