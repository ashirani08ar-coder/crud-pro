<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Pro - Task Manager</title>
</head>
<body>
    <div id="app"></div>
    <script>
        const API = 'http://localhost:3000/api/tasks';

        async function loadTasks() {
            try {
                const res = await fetch(API);
                const tasks = await res.json();
                document.getElementById('taskCount').textContent = tasks.length;
                document.getElementById('tasksContainer').innerHTML = tasks.map(t => `
                    <div style="background:white;border-radius:15px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.1);border-left:5px solid #667eea;margin-bottom:20px">
                        <h3>${t.name}</h3>
                        <p>${t.description || ''}</p>
                        <span style="background:#fff3cd;padding:5px 12px;border-radius:20px;font-size:12px">${t.priority.toUpperCase()}</span>
                        <span style="margin-left:10px;color:#666">${t.dueDate || ''}</span>
                        <div style="margin-top:15px;display:flex;gap:10px">
                            <button onclick="editTask(${t.id},'${t.name}','${t.description||''}','${t.dueDate||''}','${t.priority}')" style="flex:1;padding:10px;background:#667eea;color:white;border:none;border-radius:10px;cursor:pointer">✏️ Edit</button>
                            <button onclick="deleteTask(${t.id})" style="flex:1;padding:10px;background:#dc3545;color:white;border:none;border-radius:10px;cursor:pointer">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('') || '<p style="text-align:center;color:#666">No tasks yet!</p>';
            } catch(e) {
                document.getElementById('tasksContainer').innerHTML = '<p style="text-align:center;color:red">Backend offline!</p>';
            }
        }

        async function deleteTask(id) {
            if(confirm('Delete?')) {
                await fetch(`${API}/${id}`, {method:'DELETE'});
                loadTasks();
            }
        }

        function editTask(id, name, desc, dueDate, priority) {
            document.getElementById('name').value = name;
            document.getElementById('desc').value = desc;
            document.getElementById('dueDate').value = dueDate;
            document.getElementById('priority').value = priority;
            document.getElementById('editId').value = id;
            document.getElementById('submitBtn').textContent = '✅ Update Task';
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('app').innerHTML = `
                <div style="max-width:900px;margin:0 auto;background:white;border-radius:20px;box-shadow:0 25px 50px rgba(0,0,0,.15);overflow:hidden">
                    <div style="background:linear-gradient(45deg,#667eea,#764ba2);color:white;padding:30px;text-align:center">
                        <h1>🚀 Pro Task Manager</h1>
                        <p><span id="taskCount">0</span> Tasks</p>
                    </div>
                    <form id="taskForm" style="padding:30px;background:#f8f9fa;display:grid;gap:15px">
                        <input type="hidden" id="editId">
                        <input type="text" id="name" placeholder="📝 Task Name" required style="padding:15px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px">
                        <input type="text" id="desc" placeholder="📄 Description" style="padding:15px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px">
                        <input type="date" id="dueDate" style="padding:15px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px">
                        <select id="priority" style="padding:15px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px">
                            <option value="low">📊 Low Priority</option>
                            <option value="medium">⚡ Medium</option>
                            <option value="high">🔥 High</option>
                        </select>
                        <button type="submit" id="submitBtn" style="padding:15px;background:linear-gradient(45deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:18px;cursor:pointer">➕ Create New Task</button>
                    </form>
                    <div style="padding:30px" id="tasksContainer"></div>
                </div>
            `;

            document.getElementById('taskForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    name: document.getElementById('name').value,
                    description: document.getElementById('desc').value,
                    dueDate: document.getElementById('dueDate').value,
                    priority: document.getElementById('priority').value
                };
                const editId = document.getElementById('editId').value;
                if(editId) {
                    await fetch(`${API}/${editId}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
                } else {
                    await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
                }
                document.getElementById('taskForm').reset();
                document.getElementById('editId').value = '';
                document.getElementById('submitBtn').textContent = '➕ Create New Task';
                loadTasks();
            };

            loadTasks();
        });
    </script>
</body>
</html>
